# Compose file for the *arr stack. Configuration files are stored in the
# directory you launch the compose file on. Change to bind mounts if needed.
# All containers are ran with user and group ids of the main user and
# group to aviod permissions issues of downloaded files, please refer
# the read me file for more information.

#############################################################################
# NOTICE: We recently switched to using a .env file. PLEASE refer to the docs.
# https://github.com/TechHutTV/homelab/tree/main/media#docker-compose-and-env
#############################################################################

networks:
  servarrnetwork:
    name: servarrnetwork
    ipam:
      config:
        - subnet: 172.39.0.0/24

services:
  requestrr:
    image: thomst08/requestrr
    container_name: requestrr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
    volumes:
      - /requestrr:/root/config
    ports:
      - 4545:4545
    restart: unless-stopped
 
  nzbget:
    image: lscr.io/linuxserver/nzbget:latest
    container_name: nzbget
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./nzbget:/config
      - /data:/data
    ports:
      - "6789:6789"
    restart: unless-stopped
    network_mode: "host"

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./prowlarr:/config
    restart: unless-stopped
    networks:
      - servarrnetwork
    ports:
      - "9696:9696"

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./sonarr:/config
      - /data:/data
      - /data/downloads/nzbget/completed:/downloads/completed   # NZBGet downloads
      - /data/series:/tv                                         # Sonarr library
    ports:
      - 8989:8989
    networks:
      servarrnetwork:
        ipv4_address: 172.39.0.3

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./radarr:/config
      - /data:/data
      - /data/movies:/movies                             # Your movie library
      - /data/downloads/nzbget/completed:/downloads     # NZBGet completed downloads
    ports:
      - 7878:7878
    networks:
      servarrnetwork:
        ipv4_address: 172.39.0.4

  lidarr:
    container_name: lidarr
    image: lscr.io/linuxserver/lidarr:latest
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./lidarr:/config
      - /data:/data
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - 8686:8686
    networks:
      servarrnetwork:
        ipv4_address: 172.39.0.5

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./bazarr:/config
      - /data:/data
    ports:
      - 6767:6767
    networks:
      servarrnetwork:
        ipv4_address: 172.39.0.6

  huntarr:
    image: huntarr/huntarr:latest
    container_name: huntarr
    restart: always
    ports:
      - "9705:9705"
    volumes:
      - ./huntarr:/config
    environment:
      - TZ=America/New_York

  wizarr:
    container_name: wizarr
    image: ghcr.io/wizarrrr/wizarr
    ports:
      - 5690:5690
    restart: unless-stopped
    volumes:
      - ./wizarr:/data
    environment:
      - PUID=1000 #Set UID
      - PGID=1000 #Set GID
      - DISABLE_BUILTIN_AUTH=false #Set to true ONLY if you are using another auth provider (Authelia, Authentik, etc)
      - TZ=Europe/London #Set your timezone here
  lazylibrarian:
    image: lscr.io/linuxserver/lazylibrarian:latest
    container_name: lazylibrarian
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - DOCKER_MODS=linuxserver/mods:universal-calibre|linuxserver/mods:lazylibrarian-ffmpeg #optional
    volumes:
      - /path/to/lazylibrarian/data:/config
      - /path/to/downloads/:/downloads
      - /path/to/data/:/books #optional
      - /data/:/data
    ports:
      - 5299:5299
    restart: unless-stopped
  jfago:
    image: 'hrfee/jfa-go:latest'
    restart: unless-stopped
    ports:
      - '8056:8056'
    # - '8057:8057' used for tls
    volumes:
      - ./data:/data/
      - ./jfago:/config
      - /path/to/jellyfin:/jf
      - /etc/localtime:/etc/localtime:ro
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: meilisearch
    restart: unless-stopped
    ports:
      # This maps port 7700 on your host to the container's port 7700
      # If 7700 is taken, you can change the first number (e.g., "7701:7700")
      - "7700:7700"
    volumes:
      # This creates a persistent volume for the search data
      - meili_data:/meili_data
    environment:
      # SET YOUR MASTER KEY HERE!
      # This is your password for Meilisearch. Use a strong, random string.
      - MEILI_MASTER_KEY=iPEVTeJGTMG8KnF2Hwlt4rS4YyEh8-Lq12Mzyfov7aM

      # Sets the environment to 'production' for better performance
      - MEILI_ENV=production
  profilarr:
    image: santiagosayshey/profilarr:latest # Use :beta for early access to new features
    container_name: profilarr
    ports:
      - 6868:6868
    volumes:
      - /path/to/your/data:/config # Replace with your actual path
    environment:
      - TZ=UTC # Set your timezone
    restart: unless-stopped
  doplarr:
    environment:
     - SONARR__URL=http://localhost:8989
     - RADARR__URL=http://localhost:7878
     - SONARR__API=sonarr_api
     - RADARR__API=radarr_api
     - DISCORD__TOKEN=bot_token
    container_name: doplarr
    image: "ghcr.io/kiranshila/doplarr:latest"
volumes:
  meili_data:
