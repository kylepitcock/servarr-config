  wizarr:
    container_name: wizarr
    image: ghcr.io/wizarrrr/wizarr
    ports:
      - 5690:5690
    restart: unless-stopped
    volumes:
      - ./wizarr:/data
    environment:
      - PUID=1000 #Set UID
      - PGID=1000 #Set GID
      - DISABLE_BUILTIN_AUTH=false #Set to true ONLY if you are using another auth provider (Authelia, Authentik, etc)
      - TZ=Europe/London #Set your timezone here
  lazylibrarian:
    image: lscr.io/linuxserver/lazylibrarian:latest
    container_name: lazylibrarian
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - DOCKER_MODS=linuxserver/mods:universal-calibre|linuxserver/mods:lazylibrarian-ffmpeg #optional
    volumes:
      - /path/to/lazylibrarian/data:/config
      - /path/to/downloads/:/downloads
      - /path/to/data/:/books #optional
      - /data/:/data
    ports:
      - 5299:5299
    restart: unless-stopped
  jfago:
    image: 'hrfee/jfa-go:latest'
    restart: unless-stopped
    ports:
      - '8056:8056'
    # - '8057:8057' used for tls
    volumes:
      - ./data:/data/
      - ./jfago:/config
      - /path/to/jellyfin:/jf
      - /etc/localtime:/etc/localtime:ro
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: meilisearch
    restart: unless-stopped
    ports:
      # This maps port 7700 on your host to the container's port 7700
      # If 7700 is taken, you can change the first number (e.g., "7701:7700")
      - "7700:7700"
    volumes:
      # This creates a persistent volume for the search data
      - meili_data:/meili_data
    environment:
      # SET YOUR MASTER KEY HERE!
      # This is your password for Meilisearch. Use a strong, random string.
      - MEILI_MASTER_KEY=iPEVTeJGTMG8KnF2Hwlt4rS4YyEh8-Lq12Mzyfov7aM

      # Sets the environment to 'production' for better performance
      - MEILI_ENV=production
  profilarr:
    image: santiagosayshey/profilarr:latest # Use :beta for early access to new features
    container_name: profilarr
    ports:
      - 6868:6868
    volumes:
      - /path/to/your/data:/config # Replace with your actual path
    environment:
      - TZ=UTC # Set your timezone
    restart: unless-stopped

volumes:
  meili_data:
